// ── Persistencia automática en localStorage ───────────────────────────────────
function usePersist(key, defaultValue) {
  const [state, setState] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved !== null ? JSON.parse(saved) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
  }, [key, state]);
  return [state, setState];
}

// ── Barra de progreso animada ─────────────────────────────────────────────────
const ProgressBar = ({ value, max, color = COLORS.accent, label }) => {
  const pct = Math.min((value / max) * 100, 100);
  const isOver = value > max;
  return (
    <div style={{ marginBottom: 8 }}>
      {label && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: COLORS.muted, marginBottom: 4 }}>
        <span>{label}</span>
        <span style={{ color: isOver ? COLORS.danger : COLORS.text }}>{value} / {max}</span>
      </div>}
      <div style={{ background: "#1a2a1e", borderRadius: 99, height: 8, overflow: "hidden" }}>
        <div style={{
          width: `${pct}%`, height: "100%",
          background: isOver ? `linear-gradient(90deg, ${COLORS.danger}, #ff7a5a)` : `linear-gradient(90deg, ${color}, #7effaa)`,
          borderRadius: 99,
          transition: "width 0.6s cubic-bezier(0.34,1.56,0.64,1)",
          boxShadow: `0 0 8px ${color}88`,
        }} />
      </div>
    </div>
  );
};

const Btn = ({ children, onClick, variant = "primary", style = {}, disabled = false }) => {
  const styles = {

    danger: { background: COLORS.danger + "22", color: COLORS.danger, border: `1px solid ${COLORS.danger}44` },
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        padding: "10px 18px", borderRadius: 10, border: "none", cursor: disabled ? "not-allowed" : "pointer",
        fontSize: 14, transition: "all 0.2s", opacity: disabled ? 0.5 : 1,
        ...styles[variant], ...style,
      }}
    >{children}</button>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
const ProfileSection = ({ profile, setProfile }) => {
  const [form, setForm] = useState(profile);
  const [saved, setSaved] = useState(false);

  const bmr = () => {
    if (!form.peso || !form.altura || !form.edad) return null;
    const base = form.sexo === "hombre"
      ? 10 * form.peso + 6.25 * form.altura - 5 * form.edad + 5
      : 10 * form.peso + 6.25 * form.altura - 5 * form.edad - 161;
    const factor = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725 }[form.actividad] || 1.2;
    return Math.round(base * factor);
  };

  const imc = () => {
    if (!form.peso || !form.altura) return null;
    return (form.peso / Math.pow(form.altura / 100, 2)).toFixed(1);
  };

  const imcLabel = () => {
    const v = parseFloat(imc());
    if (v < 18.5) return { t: "Bajo peso", c: "#60a5fa" };
    if (v < 25) return { t: "Normal ✓", c: COLORS.accent };
    if (v < 30) return { t: "Sobrepeso", c: COLORS.gold };
    return { t: "Obesidad", c: COLORS.danger };
  };

  const save = () => {
    setProfile(form);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const resetAll = () => {
    if (!window.confirm("¿Borrar todos tus datos guardados? Esta acción no se puede deshacer.")) return;
    ["fc_profile","fc_tab","fc_food_log","fc_weight_entries","fc_notes","fc_workout_step","fc_workout_config","fc_workout_plan","fc_workout_day"].forEach(k => localStorage.removeItem(k));
    window.location.reload();
  };

  const field = (label, key, type = "number", opts = {}) => (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 12, color: COLORS.muted, marginBottom: 4 }}>{label}</label>
      {opts.options ? (
        <select value={form[key] || ""} onChange={e => setForm({ ...form, [key]: e.target.value })}
          style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
          {opts.options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      ) : (
        <input type={type} value={form[key] || ""} onChange={e => setForm({ ...form, [key]: type === "number" ? parseFloat(e.target.value) || "" : e.target.value })}
          placeholder={opts.placeholder || ""}
          style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />
      )}
    </div>
  );

  const calMeta = profile.objetivo === "perder" ? (bmr() - 300) : profile.objetivo === "ganar" ? (bmr() + 300) : bmr();

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      <Card glow>
        <h3 style={{ color: COLORS.accent, margin: "0 0 16px", fontSize: 16 }}>👤 Tus datos</h3>
        {field("Nombre", "nombre", "text", { placeholder: "¿Cómo te llamas?" })}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div>{field("Peso (kg)", "peso")}</div>
          <div>{field("Altura (cm)", "altura")}</div>
          <div>{field("Edad", "edad")}</div>
          <div>{field("Sexo", "sexo", "text", { options: [{ v: "hombre", l: "Hombre" }, { v: "mujer", l: "Mujer" }] })}</div>
        </div>
        {field("Actividad física", "actividad", "text", {
          options: [
            { v: "sedentario", l: "Sedentario (sin ejercicio)" },
            { v: "ligero", l: "Ligero (1-2 días/semana)" },
            { v: "moderado", l: "Moderado (3-5 días/semana)" },
            { v: "activo", l: "Muy activo (6-7 días/semana)" },
          ]
        })}
        {field("Objetivo", "objetivo", "text", {
          options: [
            { v: "perder", l: "🔥 Perder peso" },
            { v: "mantener", l: "⚖️ Mantener peso" },
            { v: "ganar", l: "💪 Ganar músculo" },
          ]
        })}
        <Btn onClick={save} style={{ width: "100%", marginTop: 4 }}>
          {saved ? "✅ ¡Guardado!" : "Guardar perfil"}
        </Btn>
        <button onClick={resetAll}
          style={{ width: "100%", marginTop: 8, padding: "8px", background: "none", border: `1px solid ${COLORS.danger}33`, borderRadius: 8, color: COLORS.danger, fontSize: 12, cursor: "pointer", opacity: 0.7 }}>
          🗑️ Borrar todos mis datos
        </button>
      </Card>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {bmr() && (
          <Card glow>
            <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>🔥 Calorías de mantenimiento</div>
            <div style={{ fontSize: 36, fontWeight: 900, color: COLORS.accent, lineHeight: 1 }}>{bmr()}</div>
            <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 4 }}>kcal / día</div>
          </Card>
        )}
        {bmr() && calMeta && (
          <Card>
            <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>🎯 Meta calórica para tu objetivo</div>
            <div style={{ fontSize: 30, fontWeight: 900, color: COLORS.gold }}>{calMeta}</div>
            <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 4 }}>kcal / día recomendadas</div>
          </Card>
        )}
        {imc() && (
          <Card>
            <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 6 }}>📊 IMC (Índice de Masa Corporal)</div>
            <div style={{ fontSize: 36, fontWeight: 900, color: imcLabel().c }}>{imc()}</div>
            <div style={{ fontSize: 13, color: imcLabel().c, marginTop: 4 }}>{imcLabel().t}</div>
          </Card>
        )}
        {!bmr() && (
          <Card style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 180, flexDirection: "column", gap: 8 }}>
            <div style={{ fontSize: 40 }}>📋</div>
            <div style={{ color: COLORS.muted, fontSize: 13, textAlign: "center" }}>Rellena tu perfil para ver tus métricas personalizadas</div>
          </Card>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// SECCIÓN: CALORÍAS (mejorada con macros, categorías y tabla nutricional)
// ═══════════════════════════════════════════════════════════════════════════════
const CaloriesSection = ({ profile }) => {
  // Diario por día: se reinicia automáticamente cada nuevo día
  const [logData, setLogData] = usePersist("fc_food_log", { date: todayKey(), items: [] });
  const log = logData.date === todayKey() ? logData.items : [];
  const setLog = (items) => setLogData({ date: todayKey(), items: typeof items === "function" ? items(log) : items });

  const [search, setSearch]     = useState("");
  const [selected, setSelected] = useState(null);
  const [grams, setGrams]       = useState(100);
  const [meal, setMeal]         = useState("Desayuno");
  const [catFilter, setCatFilter] = useState("Todos");

  // ── Reconocimiento de comida por foto (IA de visión) ──
  const [mode, setMode] = useState("buscar"); // "buscar" | "foto"
  const [provider, setProvider] = usePersist("fc_ai_provider", null); // "gemini" | "anthropic" | null
  const [geminiKey, setGeminiKey] = usePersist("fc_gemini_key", "");
  const [anthropicKey, setAnthropicKey] = usePersist("fc_anthropic_key", "");
  const [keyInput, setKeyInput] = useState("");
  const [keyError, setKeyError] = useState("");
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [photoLoading, setPhotoLoading] = useState(false);
  const [photoError, setPhotoError] = useState("");
  const [photoResults, setPhotoResults] = useState(null);
  const fileInputRef = useRef(null);

  const activeKey = provider === "gemini" ? geminiKey : provider === "anthropic" ? anthropicKey : "";

  const meta = (() => {
    if (!profile.peso || !profile.altura || !profile.edad) return 2000;
    const base = profile.sexo === "hombre"
      ? 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad + 5
      : 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad - 161;
    const factor = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725 }[profile.actividad] || 1.2;
    const bmr = Math.round(base * factor);
    return profile.objetivo === "perder" ? bmr - 300 : profile.objetivo === "ganar" ? bmr + 300 : bmr;
  })();

  const metaProt = profile.peso ? Math.round(profile.peso * (profile.objetivo === "ganar" ? 2.2 : 1.8)) : 150;
  const metaCarb = Math.round((meta * 0.40) / 4);
  const metaFat  = Math.round((meta * 0.25) / 9);

  const totalCal  = Math.round(log.reduce((s, e) => s + e.cal,  0));
  const totalProt = Math.round(log.reduce((s, e) => s + (e.prot * e.grams / 100), 0));
  const totalCarb = Math.round(log.reduce((s, e) => s + (e.carb * e.grams / 100), 0));
  const totalFat  = Math.round(log.reduce((s, e) => s + (e.fat  * e.grams / 100), 0));

  const categories = ["Todos", ...Array.from(new Set(FOODS.map(f => f.cat)))];
  const filtered = FOODS.filter(f => {
    const matchSearch = f.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = catFilter === "Todos" || f.cat === catFilter;
    return matchSearch && matchCat;
  });

  const addFood = () => {
    if (!selected) return;
    const ratio = grams / 100;
    setLog([...log, {
      ...selected, grams,
      cal:  Math.round(selected.cal  * ratio),
      prot: selected.prot * ratio,
      carb: selected.carb * ratio,
      fat:  selected.fat  * ratio,
      meal, id: Date.now()
    }]);
    setSelected(null); setSearch(""); setGrams(100);
  };

  // ── Reconocimiento de comida por foto (Gemini 2.5 Flash Vision) ──
  const PHOTO_PROMPT = `Analiza esta foto de comida. Identifica cada alimento o ingrediente visible por separado (máximo 6).

Para cada uno estima de forma realista, según el tamaño de la porción que ves:
- name: nombre del alimento en español, claro y corto (ej: "Pollo a la plancha")
- grams: cantidad visible estimada en gramos (entero)
- cal: calorías totales para esa cantidad (entero)
- prot: proteína en gramos para esa cantidad (puede tener decimales)
- carb: carbohidratos en gramos para esa cantidad
- fat: grasa en gramos para esa cantidad

Responde ÚNICAMENTE con un array JSON válido, sin texto adicional ni bloques de código. Formato exacto:
[{"name":"Pollo a la plancha","grams":150,"cal":248,"prot":46.5,"carb":0,"fat":5.4}]

Si no hay comida visible, responde: []`;

  const saveKey = () => {
    const k = keyInput.trim();
    if (provider === "gemini") {
      if (!k.startsWith("AIza")) {
        setKeyError("La clave de Gemini debe empezar por 'AIza'");
        return;
      }
      setGeminiKey(k);
    } else if (provider === "anthropic") {
      if (!k.startsWith("sk-ant-")) {
        setKeyError("La clave de Anthropic debe empezar por 'sk-ant-'");
        return;
      }
      setAnthropicKey(k);
    }
    setKeyError("");
    setKeyInput("");
  };

  // Redimensiona la imagen a máx 1024px y la convierte a base64 JPEG (más rápido y barato)
  const resizeImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1024;
        let { width, height } = img;
        if (width > height) { if (width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; } }
        else { if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; } }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.85));
      };
      img.onerror = () => reject(new Error("No se pudo procesar la imagen"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("No se pudo leer el archivo"));
    reader.readAsDataURL(file);
  });

  // Llama a Gemini (Google) — modelo gemini-2.5-flash
  const callGemini = async (base64) => {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: PHOTO_PROMPT }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }],
        generationConfig: { temperature: 0.2, responseMimeType: "application/json" },
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "Error de la API de Gemini");
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    return text.replace(/```json|```/g, "").trim();
  };

  // Llama a Claude (Anthropic) — modelo claude-haiku-4-5 (rápido y económico)
  const callAnthropic = async (base64) => {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": anthropicKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1024,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
            { type: "text", text: PHOTO_PROMPT },
          ],
        }],
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "Error de la API de Claude");
    let text = data.content?.[0]?.text || "";
    return text.replace(/```json|```/g, "").trim();
  };

  const analyzePhoto = async (file) => {
    setPhotoError(""); setPhotoResults(null); setPhotoLoading(true);
    try {
      const dataUrl = await resizeImage(file);
      setPhotoPreview(dataUrl);
      const base64 = dataUrl.split(",")[1];

      const text = provider === "gemini" ? await callGemini(base64) : await callAnthropic(base64);
      if (!text) throw new Error("La IA no devolvió ningún resultado. Prueba con otra foto.");

      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed) || parsed.length === 0) {
        setPhotoError("No se detectó ningún alimento. Prueba con una foto más clara y de cerca.");
        setPhotoResults([]);
      } else {
        // Guardamos valores "por 100g" para poder recalcular si el usuario ajusta la cantidad
        setPhotoResults(parsed.slice(0, 6).map((item, i) => {
          const g = Math.max(item.grams || 100, 1);
          return {
            id: Date.now() + i,
            name: item.name || "Alimento",
            grams: g,
            cal100:  ((item.cal  || 0) / g) * 100,
            prot100: ((item.prot || 0) / g) * 100,
            carb100: ((item.carb || 0) / g) * 100,
            fat100:  ((item.fat  || 0) / g) * 100,
            selected: true,
          };
        }));
      }
    } catch (err) {
      const providerName = provider === "gemini" ? "Gemini" : "Claude";
      setPhotoError(err.message || `No se pudo analizar la foto. Revisa tu conexión y tu clave de ${providerName}.`);
    }
    setPhotoLoading(false);
  };

  const updatePhotoGrams = (id, newGrams) => {
    setPhotoResults(prev => prev.map(item => item.id === id ? { ...item, grams: Math.max(newGrams, 0) } : item));
  };

  const togglePhotoItem = (id) => {
    setPhotoResults(prev => prev.map(item => item.id === id ? { ...item, selected: !item.selected } : item));
  };

  const addPhotoResultsToLog = () => {
    const chosen = (photoResults || []).filter(i => i.selected && i.grams > 0);
    if (chosen.length === 0) return;
    const entries = chosen.map((item, i) => ({
      name: item.name, cat: "📷 Foto IA", unit: "g", grams: item.grams,
      cal:  Math.round(item.cal100  * item.grams / 100),
      prot: item.prot100 * item.grams / 100,
      carb: item.carb100 * item.grams / 100,
      fat:  item.fat100  * item.grams / 100,
      meal, id: Date.now() + i,
    }));
    setLog([...log, ...entries]);
    setPhotoResults(null);
    setPhotoPreview(null);
  };

  const resetPhoto = () => {
    setPhotoPreview(null);
    setPhotoResults(null);
    setPhotoError("");
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const byMeal = ["Desayuno", "Almuerzo", "Merienda", "Cena"].map(m => ({
    name: m,
    items: log.filter(e => e.meal === m),
    cal: log.filter(e => e.meal === m).reduce((s, e) => s + e.cal, 0)
  }));

  const MacroBar = ({ label, val, meta: mx, color }) => (
    <div style={{ flex: 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: COLORS.muted, marginBottom: 3 }}>
        <span style={{ fontWeight: 700, color }}>{label}</span>
        <span>{val}g</span>
      </div>
      <div style={{ background: "#1a2a1e", borderRadius: 99, height: 5 }}>
        <div style={{ width: `${Math.min((val / mx) * 100, 100)}%`, height: "100%", background: color, borderRadius: 99, transition: "width 0.5s ease" }} />
      </div>
      <div style={{ fontSize: 10, color: COLORS.muted, marginTop: 2, textAlign: "right" }}>/{mx}g</div>
    </div>
  );

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      {/* Panel izquierdo: buscador */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {/* Toggle modo: búsqueda manual vs foto con IA */}
        <div style={{ display: "flex", gap: 8 }}>
          {[
            { id: "buscar", label: "🔍 Buscar manual" },
            { id: "foto", label: "📷 Foto con IA" },
          ].map(m => (
            <button key={m.id} onClick={() => setMode(m.id)}
              style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${mode === m.id ? COLORS.accent : "#2a3e2e"}`, background: mode === m.id ? COLORS.accentDim : "transparent", color: mode === m.id ? COLORS.accent : COLORS.muted, fontSize: 13, fontWeight: mode === m.id ? 700 : 400, cursor: "pointer" }}>
              {m.label}
            </button>
          ))}
        </div>

        {mode === "buscar" && (
        <Card glow>
          <h3 style={{ color: COLORS.accent, margin: "0 0 12px", fontSize: 16 }}>🔍 Buscar alimento</h3>

          {/* Buscador */}
          <input
            value={search}
            onChange={e => { setSearch(e.target.value); setSelected(null); }}
            placeholder="Escribe un alimento... (ej: pollo, avena)"
            style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, marginBottom: 8, boxSizing: "border-box" }}
          />

          {/* Filtro por categoría */}
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 10 }}>
            {categories.slice(0, 8).map(c => (
              <button key={c} onClick={() => setCatFilter(c)}
                style={{ padding: "3px 9px", borderRadius: 99, border: `1px solid ${catFilter === c ? COLORS.accent : "#2a3e2e"}`, background: catFilter === c ? COLORS.accentDim : "transparent", color: catFilter === c ? COLORS.accent : COLORS.muted, fontSize: 11, cursor: "pointer" }}>
                {c}
              </button>
            ))}
          </div>

          {/* Lista resultados */}
          {!selected && (
            <div style={{ background: "#1a2a1e", borderRadius: 8, maxHeight: 200, overflowY: "auto", border: `1px solid #2a3e2e` }}>
              {filtered.slice(0, 10).map(f => (
                <div key={f.name} onClick={() => { setSelected(f); setSearch(f.name); }}
                  style={{ padding: "8px 12px", cursor: "pointer", borderBottom: "1px solid #1e2e22", fontSize: 13, display: "flex", justifyContent: "space-between", alignItems: "center" }}
                  onMouseEnter={e => e.currentTarget.style.background = COLORS.accentDim}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div>
                    <span style={{ color: COLORS.text }}>{f.name}</span>
                    <span style={{ fontSize: 10, color: COLORS.muted, marginLeft: 6 }}>{f.cat}</span>
                  </div>
                  <span style={{ color: COLORS.accent, fontWeight: 700, fontSize: 12 }}>{f.cal} kcal</span>
                </div>

              {filtered.length === 0 && <div style={{ padding: 14, color: COLORS.muted, fontSize: 13, textAlign: "center" }}>No encontrado</div>}
            </div>

          {/* Ficha nutricional del seleccionado */}
          {selected && (
            <div style={{ background: COLORS.accentDim, borderRadius: 10, padding: 12, marginBottom: 10, border: `1px solid ${COLORS.accent}33` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                <div>
                  <div style={{ color: COLORS.accent, fontWeight: 700, fontSize: 14 }}>{selected.name}</div>
                  <div style={{ color: COLORS.muted, fontSize: 11 }}>{selected.cat} · por 100{selected.unit}</div>
                </div>
                <button onClick={() => { setSelected(null); setSearch(""); }}
                  style={{ background: "none", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: 16 }}>✕</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 10 }}>
                {[
                  { l: "Kcal", v: selected.cal, c: COLORS.accent },
                  { l: "Prot", v: `${selected.prot}g`, c: "#60a5fa" },
                  { l: "Carbs", v: `${selected.carb}g`, c: COLORS.gold },
                  { l: "Grasa", v: `${selected.fat}g`, c: "#f97316" },

                  <div key={x.l} style={{ background: "#0f1e12", borderRadius: 6, padding: "6px 4px", textAlign: "center" }}>

              </div>
              {/* Preview en tiempo real */}
              <div style={{ background: "#0f1e12", borderRadius: 8, padding: "8px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 900, color: COLORS.accent }}>{Math.round(selected.cal * grams / 100)} kcal</div>
                <div style={{ fontSize: 11, color: COLORS.muted }}>en {grams}{selected.unit} · P:{Math.round(selected.prot*grams/100)}g · C:{Math.round(selected.carb*grams/100)}g · G:{Math.round(selected.fat*grams/100)}g</div>
              </div>
            </div>
          )}

          {/* Controles cantidad + comida */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Cantidad ({selected?.unit || "g/ml"})</label>
              <input type="number" value={grams} onChange={e => setGrams(parseFloat(e.target.value) || 0)}
                style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />

            <div>
              <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Comida</label>
              <select value={meal} onChange={e => setMeal(e.target.value)}
                style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14 }}>
                {["Desayuno", "Almuerzo", "Merienda", "Cena"].map(m => <option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
          <Btn onClick={addFood} disabled={!selected} style={{ width: "100%" }}>➕ Añadir al diario</Btn>
        </Card>
        )}

        {mode === "foto" && (
        <Card glow>

            ⚠️ Necesita conexión a internet. No funcionará en esta vista previa de Claude — funcionará en cuanto subas la app a GitHub Pages.

          {!provider ? (

                  <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.text, display: "flex", alignItems: "center", gap: 8 }}>

                      <div style={{ width: 24, height: 24, borderRadius: "50%", background: COLORS.accentDim, border: `1px solid ${COLORS.accent}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 900, color: COLORS.accent, flexShrink: 0 }}>{s.n}</div>

                        <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.text }}>{s.t}</div>

                  ))}
                </>
              ) : (
                <>
                  <div style={{ fontSize: 12, color: COLORS.muted, lineHeight: 1.6, marginBottom: 14 }}>
                    Consigue tu clave de Gemini en 3 pasos:
                  </div>
                  {[

              <span style={{ color: "#f97316" }}>G: {totalFat}g</span>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
};

// ── Splits basados en evidencia ────────────────────────────────────────────────
// Principiante → Full Body 3x/semana (mejor frecuencia para principiantes)
// Intermedio → Upper/Lower 4x o PPL 3-4x
// Avanzado → PPL 4-5x (10-20 series/músculo/semana)

const SPLITS = {
  // Full Body: principiante cualquier lugar y días ≤3
  fullbody_2: (l, n) => [
    { day: "Lunes",    tipo: "Full Body A", grupos: [`push_${n}`, `pull_${n}`, `legs_${n}`, `core_${n}`] },
    { day: "Jueves",   tipo: "Full Body B", grupos: [`push_${n}`, `pull_${n}`, `legs_${n}`, `cardio_${n}`] },
  ],
  fullbody_3: (l, n) => [
    { day: "Lunes",    tipo: "Full Body A", grupos: [`push_${n}`, `pull_${n}`, `legs_${n}`, `core_${n}`] },
    { day: "Miércoles",tipo: "Full Body B", grupos: [`legs_${n}`, `push_${n}`, `pull_${n}`, `cardio_${n}`] },
    { day: "Viernes",  tipo: "Full Body C", grupos: [`pull_${n}`, `push_${n}`, `legs_${n}`, `core_${n}`] },
  ],
  // Upper/Lower: intermedio 4 días
  upperlower_4: (l, n) => [
    { day: "Lunes",    tipo: "Upper (Push)", grupos: [`push_${n}`, `core_${n}`] },
    { day: "Martes",   tipo: "Lower",        grupos: [`legs_${n}`, `cardio_${n}`] },
    { day: "Jueves",   tipo: "Upper (Pull)", grupos: [`pull_${n}`, `core_${n}`] },
    { day: "Viernes",  tipo: "Lower + Cardio",grupos:[`legs_${n}`, `cardio_${n}`] },
  ],
  // PPL: intermedio/avanzado 3-6 días
  ppl_3: (l, n) => [
    { day: "Lunes",    tipo: "Push 💪",  grupos: [`push_${n}`, `core_${n}`] },
    { day: "Miércoles",tipo: "Pull 🔙",  grupos: [`pull_${n}`, `core_${n}`] },
    { day: "Viernes",  tipo: "Legs 🦵",  grupos: [`legs_${n}`, `cardio_${n}`] },
  ],
  ppl_4: (l, n) => [
    { day: "Lunes",    tipo: "Push 💪",  grupos: [`push_${n}`, `core_${n}`] },
    { day: "Martes",   tipo: "Pull 🔙",  grupos: [`pull_${n}`] },
    { day: "Jueves",   tipo: "Legs 🦵",  grupos: [`legs_${n}`] },
    { day: "Viernes",  tipo: "Push+Pull",grupos: [`push_${n}`, `pull_${n}`, `core_${n}`] },
  ],
  ppl_5: (l, n) => [
    { day: "Lunes",    tipo: "Push 💪",  grupos: [`push_${n}`, `core_${n}`] },
    { day: "Martes",   tipo: "Pull 🔙",  grupos: [`pull_${n}`] },
    { day: "Miércoles",tipo: "Legs 🦵",  grupos: [`legs_${n}`, `cardio_${n}`] },
    { day: "Jueves",   tipo: "Push 💪",  grupos: [`push_${n}`, `core_${n}`] },

const DAY_NAMES = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

// ── Cuántos ejercicios tomar de cada grupo según nivel ────────────────────────
const EXCOUNT = { p: 3, i: 4, a: 5 }; // principiante / intermedio / avanzado

const generatePlan = (lugar, dias, nivel, objetivo, peso) => {
  const l = lugar;
  const nKey = nivel === "principiante" ? "p" : nivel === "intermedio" ? "i" : "a";
  const db = EX[l] || EX.casa;
  const count = EXCOUNT[nKey];

  // Elegir split según nivel y días disponibles
  let splitFn;
  if (nivel === "principiante") {
    splitFn = dias <= 2 ? SPLITS.fullbody_2 : SPLITS.fullbody_3;
  } else if (nivel === "intermedio") {
    splitFn = dias <= 3 ? SPLITS.ppl_3 : dias === 4 ? SPLITS.upperlower_4 : SPLITS.ppl_5;
  } else { // avanzado
    splitFn = dias <= 3 ? SPLITS.ppl_3 : dias === 4 ? SPLITS.ppl_4 : SPLITS.ppl_5;
  }

  const splitDays = splitFn(l, nKey);
  const pesoFactor = peso ? peso / 70 : 1;

  return splitDays.slice(0, dias).map((day) => {
    const exercises = [];
    day.grupos.forEach(grupoKey => {
      const pool = db[grupoKey] || [];
      // Para cardio tomar solo 1, para el resto según nivel
      const take = grupoKey.startsWith("cardio") ? 1 : count;
      pool.slice(0, take).forEach(ex => exercises.push({ ...ex, muscle: grupoKey.split("_")[0] }));
    });

    const kcalQuemadas = Math.round(
      exercises.reduce((s, e) => s + (e.kcal || 5) * (e.s || 3), 0) * pesoFactor
    );

    return {
      day: day.day,
      focus: day.tipo,
      exercises,
      kcalQuemadas,
    };
  });
};

          icons={["🏠", "🏋️"]} />

        <WizardStep title="2. ¿Cuántos días a la semana puedes entrenar?" field="dias"
          options={[{ v: 2, l: "2 días" }, { v: 3, l: "3 días" }, { v: 4, l: "4 días" }, { v: 5, l: "5 días" }]}
          icons={["✌️", "3️⃣", "4️⃣", "5️⃣"]} />

        <WizardStep title="3. ¿Cuál es tu nivel actual?" field="nivel"
          options={[{ v: "principiante", l: "Principiante" }, { v: "intermedio", l: "Intermedio" }, { v: "avanzado", l: "Avanzado" }]}
          icons={["🌱", "💪", "🔥"]} />

        {/* Preview del split */}
        {config.nivel && config.dias && (
          <div style={{ padding: "12px 16px", background: COLORS.accentDim, borderRadius: 10, marginBottom: 16, border: `1px solid ${COLORS.accent}33` }}>
            <div style={{ fontSize: 12, color: COLORS.accent, fontWeight: 700, marginBottom: 4 }}>
              📋 Tu metodología de entrenamiento:
            </div>
            <div style={{ fontSize: 12, color: COLORS.text }}>
              {config.nivel === "principiante"
                ? `Full Body ${Math.min(config.dias, 3)}x/semana — Ideal para principiantes: cada músculo se entrena 2-3 veces por semana con alta frecuencia`
                : config.nivel === "intermedio"
                ? config.dias <= 3
                  ? "PPL (Push/Pull/Legs) 3 días — Split clásico probado para intermedios, equilibrio volumen/recuperación"
                  : config.dias === 4
                  ? "Upper/Lower 4 días — Cada músculo 2x/semana, óptimo para hipertrofia intermedia"
                  : "PPL 5 días — Alta frecuencia, 10-15 series/músculo/semana según la ciencia"
                : config.dias <= 3
                  ? "PPL avanzado 3 días — Alta intensidad por sesión, 5-6 ejercicios/grupo"
                  : config.dias === 4
                  ? "PPL 4 días con Push+Pull combinado — 12-16 series/músculo/semana"
                  : "PPL 5 días — Volumen máximo: 15-20 series/músculo/semana (rango óptimo científico)"
              }
            </div>
          </div>
        )}

        {!profile.peso && (
          <div style={{ padding: "10px 14px", background: "#1e2e22", borderRadius: 8, fontSize: 12, color: COLORS.gold, marginBottom: 16 }}>
            💡 Rellena tu perfil para que las calorías a quemar sean exactas para tu peso
          </div>
        )}

        <Btn onClick={buildPlan} disabled={!ready} style={{ width: "100%", padding: "14px", fontSize: 15 }}>
          {ready ? "🚀 Generar mi plan" : "Selecciona las 3 opciones para continuar"}
        </Btn>
      </Card>
    );
  }

  // ── Plan activo ──
  const today = plan[activeDay];
  const exDone = Object.values(done).filter(Boolean).length;
  const totalEx = today.exercises.length;
  const weekKcal = plan.reduce((s, d) => s + d.kcalQuemadas, 0);

  return (
    <div>
      {/* Header del plan */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
        <div>
          <div style={{ fontWeight: 900, fontSize: 18, color: COLORS.text }}>
            {config.lugar === "casa" ? "🏠" : "🏋️"} Plan {config.nivel} · {config.dias} días/semana
          </div>
          <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 2 }}>
            🔥 {weekKcal} kcal quemadas estimadas esta semana
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 900, color: timer ? COLORS.accent : COLORS.muted, fontVariantNumeric: "tabular-nums" }}>{fmt(seconds)}</div>
          <Btn onClick={startTimer} variant={timer ? "danger" : "primary"} style={{ padding: "8px 14px" }}>
            {timer ? "⏸ Parar" : "▶ Iniciar"}
          </Btn>
          <Btn onClick={() => { setStep(0); setConfig({ lugar: null, dias: null, nivel: null }); setPlan(null); }} variant="ghost" style={{ padding: "8px 12px", fontSize: 12 }}>
            ✏️ Cambiar
          </Btn>
        </div>
      </div>

      {/* Selector de días */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
        {plan.map((d, i) => (
          <button key={i} onClick={() => { setActiveDay(i); setDone({}); }}
            style={{
              padding: "8px 14px", borderRadius: 10, border: `1px solid ${activeDay === i ? COLORS.accent : "#2a3e2e"}`,
              background: activeDay === i ? COLORS.accentDim : "transparent",
              color: activeDay === i ? COLORS.accent : COLORS.muted,
              cursor: "pointer", fontSize: 13, fontWeight: activeDay === i ? 700 : 400, whiteSpace: "nowrap",
            }}>
            {d.day}
            <div style={{ fontSize: 10, marginTop: 1 }}>{d.kcalQuemadas} kcal</div>
          </button>
        ))}
      </div>

      {/* Info del día */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
        {[
          { l: "Foco muscular", v: today.focus, c: COLORS.accent },
          { l: "Calorías a quemar", v: `~${today.kcalQuemadas} kcal`, c: COLORS.danger },
          { l: "Ejercicios", v: `${exDone}/${totalEx} completados`, c: COLORS.gold },
        ].map(x => (
          <Card key={x.l} style={{ padding: "10px 14px" }}>
            <div style={{ fontSize: 11, color: COLORS.muted, marginBottom: 3 }}>{x.l}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: x.c }}>{x.v}</div>
          </Card>
        ))}
      </div>

      <ProgressBar value={exDone} max={totalEx} label="Progreso del entrenamiento" />

      {/* Ejercicios */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 12 }}>
        {today.exercises.map((ex, i) => (
          <Card key={i} glow={!!done[i]} style={{ border: done[i] ? `1px solid ${COLORS.accent}` : "1px solid #1e2e22", transition: "all 0.2s", opacity: done[i] ? 0.75 : 1 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <button onClick={() => setDone(d => ({ ...d, [i]: !d[i] }))}
                style={{ width: 28, height: 28, borderRadius: "50%", border: `2px solid ${done[i] ? COLORS.accent : "#2a3e2e"}`, background: done[i] ? COLORS.accent : "transparent", cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, color: "#0a1a0d", fontWeight: 900, marginTop: 2 }}>
                {done[i] ? "✓" : ""}
              </button>
              <div style={{ flex: 1 }}>
                {/* Nombre + badge músculo */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: done[i] ? COLORS.accent : COLORS.text, textDecoration: done[i] ? "line-through" : "none", lineHeight: 1.3 }}>{ex.n}</div>
                  <span style={{ fontSize: 9, padding: "2px 6px", background: COLORS.accentDim, borderRadius: 99, color: COLORS.accent, flexShrink: 0, textTransform: "capitalize", whiteSpace: "nowrap" }}>{ex.muscle}</span>
                </div>
                {/* Tags de volumen */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                  {[
                    { l: `${ex.s} series`, c: "#60a5fa" },
                    { l: `${ex.r} reps`, c: COLORS.gold },
                    { l: `⏱ ${ex.rest}`, c: COLORS.muted },
                    { l: `🔥 ~${Math.round((ex.kcal||5)*ex.s*(profile.peso||70)/70)} kcal`, c: COLORS.danger },
                  ].map(tag => (
                    <span key={tag.l} style={{ fontSize: 10, padding: "2px 7px", background: "#1a2a1e", borderRadius: 99, color: tag.c }}>{tag.l}</span>
                  ))}
                </div>
                {/* Consejo técnico */}
                {ex.tip && (
                  <div style={{ marginTop: 7, padding: "5px 8px", background: "#1a2a1e", borderRadius: 6, borderLeft: `2px solid ${COLORS.accent}44` }}>
                    <span style={{ fontSize: 10, color: COLORS.muted }}>💡 </span>
                    <span style={{ fontSize: 10, color: COLORS.muted, fontStyle: "italic" }}>{ex.tip}</span>
                  </div>
                )}
              </div>
            </div>
          </Card>
        ))}
      </div>

      {exDone === totalEx && totalEx > 0 && (
        <Card glow style={{ marginTop: 16, textAlign: "center", padding: 24 }}>
          <div style={{ fontSize: 44, marginBottom: 8 }}>🏆</div>
          <div style={{ fontSize: 20, fontWeight: 900, color: COLORS.accent }}>¡Sesión completada!</div>
          <div style={{ color: COLORS.muted, fontSize: 13, marginTop: 4 }}>Tiempo: {fmt(seconds)} · ~{today.kcalQuemadas} kcal quemadas · ¡Excelente trabajo!</div>
        </Card>
      )}
    </div>
  );
};

// SECCIÓN: PROGRESO (con persistencia)
// ═══════════════════════════════════════════════════════════════════════════════
const ProgressSection = ({ profile }) => {
  const [entries, setEntries] = usePersist("fc_weight_entries", []);
  const [notes, setNotes]     = usePersist("fc_notes", []);
  const [newWeight, setNewWeight] = useState("");
  const [newDate, setNewDate]     = useState(new Date().toISOString().split("T")[0]);
  const [note, setNote]           = useState("");

  const addEntry = () => {
    if (!newWeight) return;
    const updated = [...entries, { date: newDate, weight: parseFloat(newWeight) }].sort((a, b) => a.date.localeCompare(b.date));
    setEntries(updated);
    setNewWeight("");
  };

  const first = entries[0]?.weight;
  const last = entries[entries.length - 1]?.weight;
  const diff = first && last ? (last - first).toFixed(1) : null;
  const meta = profile.pesoMeta || (profile.peso ? profile.peso - 5 : null);

  // Mini gráfico SVG
  const chartW = 360, chartH = 120;
  const weights = entries.map(e => e.weight);
  const minW = Math.min(...weights) - 1;
  const maxW = Math.max(...weights) + 1;
  const px = (i) => (i / (entries.length - 1)) * (chartW - 40) + 20;
  const py = (w) => chartH - 20 - ((w - minW) / (maxW - minW)) * (chartH - 40);
  const pathD = entries.map((e, i) => `${i === 0 ? "M" : "L"}${px(i)},${py(e.weight)}`).join(" ");

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      <div>
        <Card glow style={{ marginBottom: 12 }}>
          <h3 style={{ color: COLORS.accent, margin: "0 0 16px", fontSize: 16 }}>⚖️ Registrar peso</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Fecha</label>
              <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)}
                style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />
            </div>
            <div>
              <label style={{ fontSize: 12, color: COLORS.muted, display: "block", marginBottom: 4 }}>Peso (kg)</label>
              <input type="number" step="0.1" value={newWeight} onChange={e => setNewWeight(e.target.value)} placeholder="80.5"
                style={{ width: "100%", padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 14, boxSizing: "border-box" }} />
            </div>
          </div>
          <Btn onClick={addEntry} disabled={!newWeight} style={{ width: "100%" }}>Añadir registro</Btn>
        </Card>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
          {[
            { l: "Actual", v: last ? `${last} kg` : "-", c: COLORS.accent },
            { l: "Cambio total", v: diff ? `${diff > 0 ? "+" : ""}${diff} kg` : "-", c: parseFloat(diff) < 0 ? COLORS.accent : COLORS.danger },
            { l: "Meta", v: meta ? `${meta} kg` : "Sin definir", c: COLORS.gold },
          ].map(x => (
            <Card key={x.l} style={{ textAlign: "center", padding: 14 }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: x.c }}>{x.v}</div>
              <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 3 }}>{x.l}</div>
            </Card>
          ))}
        </div>

        <Card>
          <h3 style={{ color: COLORS.accent, margin: "0 0 12px", fontSize: 16 }}>📝 Notas rápidas</h3>
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <input value={note} onChange={e => setNote(e.target.value)} placeholder="¿Cómo te has sentido hoy?"
              style={{ flex: 1, padding: "10px 12px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 8, color: COLORS.text, fontSize: 13 }} />
            <Btn onClick={() => { if (note) { setNotes([{ text: note, date: new Date().toLocaleDateString() }, ...notes]); setNote(""); } }}>+</Btn>
          </div>
          {notes.slice(0, 4).map((n, i) => (
            <div key={i} style={{ padding: "6px 10px", background: "#1a2a1e", borderRadius: 6, marginBottom: 6, fontSize: 13 }}>
              <span style={{ color: COLORS.muted, fontSize: 11 }}>{n.date} — </span>{n.text}
            </div>
          ))}
        </Card>
      </div>

      <Card glow>
        <h3 style={{ color: COLORS.accent, margin: "0 0 16px", fontSize: 16 }}>📈 Evolución del peso</h3>
        {entries.length > 1 ? (
          <svg width="100%" viewBox={`0 0 ${chartW} ${chartH}`} style={{ overflow: "visible" }}>
            <defs>
              <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={COLORS.accent} stopOpacity="0.2" />
                <stop offset="100%" stopColor={COLORS.accent} stopOpacity="0" />
              </linearGradient>
            </defs>
            <path d={pathD + ` L${px(entries.length - 1)},${chartH - 20} L${px(0)},${chartH - 20} Z`} fill="url(#lineGrad)" />
            <path d={pathD} fill="none" stroke={COLORS.accent} strokeWidth="2" strokeLinejoin="round" />
            {entries.map((e, i) => (
              <g key={i}>
                <circle cx={px(i)} cy={py(e.weight)} r="4" fill={COLORS.accent} />
                <text x={px(i)} y={py(e.weight) - 10} textAnchor="middle" fontSize="10" fill={COLORS.muted}>{e.weight}</text>
              </g>
            ))}
            {entries.map((e, i) => (
              <text key={`d${i}`} x={px(i)} y={chartH - 4} textAnchor="middle" fontSize="9" fill={COLORS.muted}>
                {e.date.slice(5)}
              </text>
            ))}
          </svg>
        ) : <div style={{ color: COLORS.muted, textAlign: "center", padding: 40, fontSize: 13 }}>Añade al menos 2 registros para ver la gráfica</div>}

        <div style={{ marginTop: 16 }}>
          <h4 style={{ color: COLORS.muted, fontSize: 13, margin: "0 0 10px" }}>Historial</h4>
          <div style={{ maxHeight: 220, overflowY: "auto" }}>
            {[...entries].reverse().map((e, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 10px", background: "#1a2a1e", borderRadius: 6, marginBottom: 4, fontSize: 13 }}>
                <span style={{ color: COLORS.muted }}>{e.date}</span>
                <span style={{ color: COLORS.accent, fontWeight: 700 }}>{e.weight} kg</span>
              </div>
            ))}
          </div>
        </div>
      </Card>
    </div>
  );
};

// MOTOR DE RESPUESTAS INTELIGENTES (sin API, 100% local)
// ═══════════════════════════════════════════════════════════════════════════════
const getSmartReply = (text, profile) => {
  const q = text.toLowerCase();
  const nombre = profile.nombre ? `, ${profile.nombre}` : "";
  const obj = profile.objetivo === "perder" ? "perder peso" : profile.objetivo === "ganar" ? "ganar músculo" : "mantener tu peso";
  const cal = (() => {
    if (!profile.peso || !profile.altura || !profile.edad) return null;
    const base = profile.sexo === "hombre"
      ? 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad + 5
      : 10 * profile.peso + 6.25 * profile.altura - 5 * profile.edad - 161;
    const f = { sedentario: 1.2, ligero: 1.375, moderado: 1.55, activo: 1.725 }[profile.actividad] || 1.375;
    const bmr = Math.round(base * f);
    return profile.objetivo === "perder" ? bmr - 300 : profile.objetivo === "ganar" ? bmr + 300 : bmr;
  })();

  // ── Calorías / metabolismo ──
  if (/calor[ií]a|cu[aá]nto como|d[eé]ficit|super[aá]vit|metabolismo|quemar|kcal/i.test(q)) {
    if (cal) {
      return `🔥 **Tu meta calórica personalizada es ${cal} kcal/día** para ${obj}.\n\nDistribución recomendada:\n- **Proteínas:** ${Math.round(profile.peso * 2)}g/día (${Math.round(profile.peso * 2 * 4)} kcal) — clave para preservar músculo\n- **Carbohidratos:** ${Math.round((cal * 0.4) / 4)}g/día (${Math.round(cal * 0.4)} kcal) — tu combustible\n- **Grasas saludables:** ${Math.round((cal * 0.25) / 9)}g/día (${Math.round(cal * 0.25)} kcal)\n\nPara acelerar tu metabolismo:\n1. No te saltes el desayuno\n2. Come cada 3-4 horas en raciones pequeñas\n3. Prioriza proteínas en cada comida\n4. Bebe 2-3L de agua al día 💧\n\n¡Registra tu comida en la pestaña 🔥 Calorías para llevar el control!`;
    }
    return `🔥 Para calcular tus calorías exactas necesito tus datos.\n\nVe a la pestaña **👤 Perfil**, rellena tu peso, altura, edad y objetivo, y te daré tu número personalizado al instante.\n\nComo referencia general:\n- Mujer activa: ~1.800-2.200 kcal/día\n- Hombre activo: ~2.200-2.800 kcal/día\n- Para perder peso: resta 300-500 kcal a tu mantenimiento\n\n¡Completa tu perfil para una respuesta exacta! 💪`;
  }

  // ── Perder peso ──
  if (/perder peso|adelgazar|bajar de peso|grasa|quemar grasa|delgad/i.test(q)) {
    return `🎯 **Plan para perder peso de forma efectiva${nombre}:**\n\n**Nutrición (70% del resultado):**\n- Crea un déficit de 300-500 kcal/día (no más)\n- Come proteína en cada comida: pollo, huevo, atún, legumbres\n- Verduras sin límite: llenan y tienen pocas calorías\n- Elimina ultraprocesados, bebidas azucaradas y alcohol\n- No te saltes comidas: acelera el metabolismo comerlas\n\n**Entrenamiento (30% del resultado):**\n- Combina fuerza + cardio 3-4 días/semana\n- El músculo quema más calorías en reposo\n- Cardio: caminar rápido, bicicleta, natación 30 min\n\n**Clave mental:**\n- La constancia vence a la intensidad\n- 0,5-1 kg/semana es un ritmo sano y sostenible\n- No pesarse cada día: hazlo mismo día y hora cada semana\n\n¡Tú puedes! 🔥`;
  }

  // ── Ganar músculo ──
  if (/ganar m[úu]sculo|masa muscular|volumen|hipertrofia|pesas|fuerza/i.test(q)) {
    return `💪 **Plan para ganar músculo${nombre}:**\n\n**Nutrición clave:**\n- Superávit calórico de 200-300 kcal sobre tu mantenimiento\n- **Proteína:** mínimo ${profile.peso ? profile.peso * 1.8 + "g" : "1,8g/kg"}/día — imprescindible\n- Carbohidratos antes y después de entrenar\n- Come cada 3-4 horas\n\n**Alimentos estrella:**\n🥚 Huevos · 🍗 Pollo · 🐟 Salmón · 🫘 Legumbres · 🍚 Arroz · 🥜 Frutos secos\n\n**Entrenamiento:**\n- Entrena cada músculo 2x/semana\n- Series de 6-12 repeticiones con peso progresivo\n- Descanso de 48h entre el mismo grupo muscular\n- Duerme 7-9h — el músculo crece durmiendo\n\n**Suplementos básicos (opcionales):**\n- Creatina monohidrato: 3-5g/día\n- Proteína de suero si no llegas con la dieta\n\n¡A por ello! 🏋️`;
  }

  // ── Rutina / entrenamiento ──
  if (/rutina|entrenamiento|ejercicio|tabla|plan de entreno|workout|empezar a entrenar/i.test(q)) {
    return `🏋️ **Rutina recomendada para ${obj}${nombre}:**\n\n**Semana tipo (3 días):**\n\n📅 **Lunes — Piernas + Core:**\nSentadillas 4×10 · Peso muerto 3×8 · Zancadas 3×12 · Plancha 3×45s\n\n📅 **Miércoles — Pecho + Espalda:**\nFlexiones / Press banca 4×10 · Remo 3×12 · Dominadas / Jalón 3×8 · Press hombro 3×10\n\n📅 **Viernes — Full body + Cardio:**\nCircuito de 5 ejercicios × 3 rondas + 20 min cardio moderado\n\n**Principios clave:**\n- Calienta siempre 5-10 min antes\n- Descansa 60-90s entre series\n- Progresión: añade peso o reps cada semana\n- Estira 5-10 min al terminar\n\n👉 Ve a la pestaña **🏋️ Entrena** para seguir tu rutina con cronómetro incluido!`;
  }

  // ── Menú / nutrición ──
  if (/men[úu]|qu[eé] comer|dieta|alimentaci[oó]n|nutrici[oó]n|desayuno|almuerzo|cena|merienda/i.test(q)) {
    return `🍽️ **Menú semanal saludable${nombre}:**\n\n**Desayunos (elige 1 cada día):**\n- Avena con plátano + 2 huevos cocidos\n- Yogur natural + frutas + nueces\n- Tostada integral + aguacate + huevo\n\n**Almuerzos:**\n- Pollo a la plancha + arroz integral + brócoli\n- Salmón al horno + patata + ensalada\n- Lentejas con verduras + pan integral\n\n**Meriendas:**\n- Fruta + puñado de almendras\n- Yogur griego + arándanos\n- Tostada integral + queso fresco\n\n**Cenas (ligeras):**\n- Tortilla de 3 huevos + ensalada\n- Pavo a la plancha + verduras salteadas\n- Sopa de verduras + pechuga\n\n**Regla de oro:** proteína + verdura + carbohidrato de calidad en cada comida 🌿\n\nUsa la pestaña **🔥 Calorías** para controlar tu ingesta diaria!`;
  }

  // ── Motivación ──
  if (/motivaci[oó]n|no puedo|me rindo|cansado|difícil|ayuda|ánimo/i.test(q)) {
    return `💚 **¡Oye${nombre}, estás aquí y eso ya es mucho!**\n\nRecuerda por qué empezaste. El cambio no ocurre de la noche a la mañana, pero sí ocurre si eres constante.\n\n**Pequeños trucos para días difíciles:**\n- Solo comprométete con 10 minutos de ejercicio — normalmente seguirás\n- Prepara tu ropa de entreno la noche anterior\n- Busca un compañero de entrenamiento o un grupo\n- Celebra cada pequeño logro: 1 kg menos, una serie más\n\n**Perspectiva:**\nEn 3 meses notarás la diferencia en el espejo.\nEn 6 meses te lo notará todo el mundo.\nEn 1 año habrás transformado tu vida.\n\n**Hoy es el mejor día para empezar. Tienes esto. 💪🔥**`;
  }

  // ── Proteína ──
  if (/prote[íi]na|pollo|huevo|atún|salmón|carne|legumbre/i.test(q)) {
    return `🥩 **La proteína: tu aliada número 1${nombre}**\n\n**¿Cuánta necesitas?**\n- Sedentario: 0,8g por kg de peso\n- Activo / perder grasa: 1,6-2g por kg\n- Ganar músculo: 2-2,5g por kg\n${profile.peso ? `\n👉 Para ti: **${Math.round(profile.peso * 2)}g/día** aprox.` : ""}\n\n**Mejores fuentes (por 100g):**\n🍗 Pechuga pollo: 31g proteína · 165 kcal\n🐟 Atún: 30g · 116 kcal\n🥚 Huevo entero: 13g · 155 kcal\n🫘 Lentejas: 9g · 116 kcal\n🧀 Queso fresco: 12g · 98 kcal\n🐄 Yogur griego: 10g · 97 kcal\n\n**Consejo:** distribuye la proteína en 4-5 comidas para mejor absorción.\n\nRegistra tus alimentos en la pestaña **🔥 Calorías** para no perder el control 📊`;
  }

  // ── Hidratación / agua ──
  if (/agua|hidrataci[oó]n|beber|líquido/i.test(q)) {
    return `💧 **Hidratación: el nutriente olvidado${nombre}**\n\nEl agua es fundamental para:\n- Rendimiento deportivo (perder un 2% ya afecta el rendimiento)\n- Metabolismo y quema de grasa\n- Recuperación muscular\n- Digestión y saciedad\n\n**¿Cuánta agua necesitas?**\n${profile.peso ? `- Tu caso: **${(profile.peso * 0.033).toFixed(1)} litros/día** mínimo` : "- Regla general: 35ml por kg de peso"}\n- +500ml por hora de ejercicio intenso\n- Más si hace calor\n\n**Trucos para beber más:**\n- Una botella de 1L en la mesa siempre visible\n- Un vaso grande al despertar\n- Infusiones sin azúcar cuentan\n- Agua con rodaja de limón si te aburre sola\n\n¡El agua es gratis y transforma tu cuerpo! 💪`;
  }

  // ── Sueño / descanso ──
  if (/sue[ñn]o|dormir|descanso|recuperaci[oó]n|cansancio/i.test(q)) {
    return `😴 **El sueño: el entrenamiento invisible${nombre}**\n\nDurante el sueño tu cuerpo:\n- Libera hormona del crecimiento (construye músculo)\n- Repara tejido muscular dañado\n- Regula grelina y leptina (hormonas del hambre)\n- Consolida la memoria y la motivación\n\n**Necesitas 7-9 horas de calidad**\n\n**Rutina de sueño óptima:**\n- Misma hora de dormir y despertar cada día\n- Sin pantallas 1h antes de dormir\n- Habitación oscura y fresca (18-20°C)\n- No cenar muy tarde ni muy abundante\n- Evita cafeína después de las 14h\n\n**¿Poco sueño = menos resultados?**\nSí. Con 5-6h: +24% más hambre, peor recuperación muscular, más cortisol (acumula grasa).\n\n¡Dormir bien ES entrenar! 🌙`;
  }

  // ── Saludo ──
  if (/hola|buenos|buenas|qu[eé] tal|hi |hey /i.test(q)) {
    return `¡Hola${nombre}! 👋 ¿Listo para dar el siguiente paso hacia ${obj}?\n\nPuedo ayudarte con:\n- 🍽️ Qué comer y cómo calcular tus calorías\n- 🏋️ Rutinas de entrenamiento según tu nivel\n- 📊 Seguimiento y motivación\n- 💡 Dudas sobre nutrición y fitness\n\n¿Qué necesitas hoy? Prueba una de las preguntas rápidas de abajo o escríbeme lo que quieras 💪`;
  }

  // ── Respuesta genérica inteligente ──
  const topics = [
    "perder peso y quemar grasa",
    "ganar músculo e hipertrofia",
    "calorías y nutrición",
    "rutinas de entrenamiento",
    "menús y qué comer",
    "motivación y constancia",
    "proteínas y suplementos",
    "hidratación y descanso",
  ];
  return `💬 Entendido${nombre}. Sobre **"${text.slice(0, 60)}${text.length > 60 ? "..." : ""}"**:\n\nAhora mismo mi conocimiento cubre estos temas en profundidad:\n${topics.map(t => `- ${t}`).join("\n")}\n\nPrueba a reformular tu pregunta o usa los accesos rápidos de abajo para obtener consejos detallados y personalizados. También puedes explorar las otras secciones de la app:\n- 🔥 **Calorías** para registrar lo que comes\n- 🏋️ **Entrena** para seguir tu rutina\n- 📈 **Progreso** para ver tu evolución\n\n¡Estoy aquí para lo que necesites! 💪`;
};

// ═══════════════════════════════════════════════════════════════════════════════
// SECCIÓN: CHAT CON IA (motor offline inteligente)
// ═══════════════════════════════════════════════════════════════════════════════
const ChatSection = ({ profile }) => {
  const [messages, setMessages] = useState([
    {
      role: "assistant",
      content: `¡Hola${profile.nombre ? `, ${profile.nombre}` : ""}! 💪 Soy **FitCoach IA**, tu entrenador personal y nutricionista virtual.\n\nPuedo ayudarte con:\n- 🍽️ Planes de nutrición y cálculo de calorías\n- 🏋️ Rutinas de entrenamiento personalizadas\n- 📊 Consejos para alcanzar tu objetivo\n- 🧠 Responder dudas sobre fitness y salud\n\n¿Por dónde empezamos?`
    }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const QUICK = [
    "¿Qué debo comer para perder peso?",
    "Dame una rutina para principiantes",
    "¿Cuántas calorías necesito al día?",
    "Menú semanal saludable",
    "¿Cómo acelerar el metabolismo?",
    "¿Cuánta proteína necesito?",
    "Consejos para dormir mejor",
    "¡Necesito motivación!",
  ];

  const send = (text) => {
    const userMsg = (text || input).trim();
    if (!userMsg || loading) return;
    setInput("");
    setLoading(true);
    const updated = [...messages, { role: "user", content: userMsg }];
    setMessages(updated);
    // Simula tiempo de "pensamiento" para que se sienta natural
    setTimeout(() => {
      const reply = getSmartReply(userMsg, profile);
      setMessages([...updated, { role: "assistant", content: reply }]);
      setLoading(false);
    }, 700 + Math.random() * 500);
  };

  const renderText = (text) => {
    return text.split("\n").map((line, i) => {
      const html = line
        .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#39e07a">$1</strong>')
        .replace(/^- /, "• ");
      return <div key={i} style={{ minHeight: 8 }} dangerouslySetInnerHTML={{ __html: html || "&nbsp;" }} />;
    });
  };

  return (
    <Card glow style={{ display: "flex", flexDirection: "column", height: 600, padding: 0, overflow: "hidden" }}>
      {/* Header */}
      <div style={{ padding: "14px 20px", borderBottom: "1px solid #1e2e22", display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 38, height: 38, borderRadius: "50%", background: `linear-gradient(135deg, ${COLORS.accent}, #7effaa)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>🤖</div>
        <div>
          <div style={{ fontWeight: 700, color: COLORS.text, fontSize: 15 }}>FitCoach IA</div>
          <div style={{ fontSize: 11, color: COLORS.accent }}>● Activo · Responde al instante</div>
        </div>
      </div>

      {/* Mensajes */}
      <div style={{ flex: 1, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
            <div style={{
              maxWidth: "82%", padding: "10px 14px",
              borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
              background: m.role === "user" ? `linear-gradient(135deg, ${COLORS.accent}, #7effaa)` : "#1e2e22",
              color: m.role === "user" ? "#0a1a0d" : COLORS.text, fontSize: 13, lineHeight: 1.65,
            }}>
              {renderText(m.content)}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-start" }}>
            <div style={{ padding: "12px 16px", background: "#1e2e22", borderRadius: "16px 16px 16px 4px", display: "flex", gap: 5, alignItems: "center" }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: COLORS.accent, animation: `bounce 1s ${i * 0.2}s infinite` }} />
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Preguntas rápidas */}
      <div style={{ padding: "8px 14px", borderTop: "1px solid #1e2e22", display: "flex", gap: 6, flexWrap: "wrap" }}>
        {QUICK.map(q => (
          <button key={q} onClick={() => send(q)}
            style={{ padding: "5px 11px", borderRadius: 99, border: `1px solid #2a3e2e`, background: "transparent", color: COLORS.muted, fontSize: 11, cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.accent; e.currentTarget.style.color = COLORS.accent; e.currentTarget.style.background = COLORS.accentDim; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#2a3e2e"; e.currentTarget.style.color = COLORS.muted; e.currentTarget.style.background = "transparent"; }}>
            {q}
          </button>
        ))}
      </div>

      {/* Input */}
      <div style={{ padding: "12px 16px", borderTop: "1px solid #1e2e22", display: "flex", gap: 10 }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()}
          placeholder="Pregúntame cualquier cosa sobre fitness y nutrición..."
          style={{ flex: 1, padding: "10px 14px", background: "#1a2a1e", border: `1px solid #2a3e2e`, borderRadius: 10, color: COLORS.text, fontSize: 14, outline: "none" }}
        />
        <Btn onClick={() => send()} disabled={!input.trim() || loading} style={{ padding: "10px 18px" }}>
          {loading ? "..." : "Enviar"}
        </Btn>
      </div>

      <style>{`@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }`}</style>
    </Card>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "perfil", label: "Perfil", emoji: "👤" },
  { id: "calorias", label: "Calorías", emoji: "🔥" },
  { id: "entrenamiento", label: "Entrena", emoji: "🏋️" },
  { id: "progreso", label: "Progreso", emoji: "📈" },
  { id: "coach", label: "Coach IA", emoji: "🤖" },
];

function App() {
  const [tab, setTab] = usePersist("fc_tab", "perfil");
  const [profile, setProfile] = usePersist("fc_profile", {
    nombre: "", peso: "", altura: "", edad: "", sexo: "hombre",
    actividad: "moderado", objetivo: "perder"
  });

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background: `linear-gradient(180deg, ${COLORS.surface} 0%, ${COLORS.bg} 100%)`, borderBottom: "1px solid #1e2e22", padding: "16px 24px", display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 12, background: `linear-gradient(135deg, ${COLORS.accent}, #7effaa)`,
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0,
          boxShadow: `0 0 20px ${COLORS.accentGlow}`,
        }}>💪</div>
        <div>
          <div style={{ fontWeight: 900, fontSize: 20, letterSpacing: -0.5 }}>
            Fit<span style={{ color: COLORS.accent }}>Coach</span> IA
          </div>
          <div style={{ fontSize: 12, color: COLORS.muted }}>Tu entrenador personal inteligente</div>
        </div>
        {profile.nombre && (
          <div style={{ marginLeft: "auto", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
            <div style={{ fontSize: 13, color: COLORS.muted }}>
              Hola, <span style={{ color: COLORS.accent, fontWeight: 700 }}>{profile.nombre}</span> 👋
            </div>
            <div style={{ fontSize: 10, color: COLORS.muted, display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: COLORS.accent, display: "inline-block" }} />
              Datos guardados automáticamente
            </div>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, padding: "12px 24px", borderBottom: "1px solid #1e2e22", background: COLORS.surface, overflowX: "auto" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{
              padding: "8px 16px", borderRadius: 10, border: "none", cursor: "pointer", whiteSpace: "nowrap",
              background: tab === t.id ? COLORS.accentDim : "transparent",
              color: tab === t.id ? COLORS.accent : COLORS.muted,
              fontWeight: tab === t.id ? 700 : 400, fontSize: 14,
              borderBottom: tab === t.id ? `2px solid ${COLORS.accent}` : "2px solid transparent",
              transition: "all 0.2s",
            }}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "20px 24px", maxWidth: 900, margin: "0 auto" }}>
        {tab === "perfil" && <ProfileSection profile={profile} setProfile={setProfile} />}
        {tab === "calorias" && <CaloriesSection profile={profile} />}
        {tab === "entrenamiento" && <WorkoutSection profile={profile} />}
        {tab === "progreso" && <ProgressSection profile={profile} />}
        {tab === "coach" && <ChatSection profile={profile} />}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(() => splash.remove(), 600);
        }
      }, 1900);
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'fitcoach-v3';
        const URLS = [self.location.href];
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request)))
          );
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
</body>
